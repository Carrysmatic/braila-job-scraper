name: Job Scraper

on:
  schedule:
    # Runs at 7:00, 11:00, 15:00, 19:00 UTC 
    # (Which is approx 9AM, 1PM, 5PM, 9PM Romania time)
    - cron: '0 7,11,15,19 * * *'
  workflow_dispatch: # Allows manual run button

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          cache: 'pip' # Caches dependencies to make runs faster

      - name: Install libraries
        run: pip install -r requirements.txt

      - name: Run Scraper
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python main.py

      - name: Save History
        run: |
          git config --global user.name "JobBot"
          git config --global user.email "bot@noreply.github.com"
          
          # 1. Pull latest changes to avoid conflicts
          git pull origin HEAD --rebase || echo "Nothing to pull"
          
          # 2. Force add the file
          git add job_history.json
          
          # 3. Check status (for debugging logs)
          git status
          
          # 4. Commit with a timestamp so every commit is unique
          git commit -m "Update history - $(date)" || echo "No changes to commit"
          
          # 5. Push explicitly to the current branch
          git push origin HEAD
